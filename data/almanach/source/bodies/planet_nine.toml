id = "planet_nine"

description = """\
[b]Planet Nine[/b] ist ein hypothetischer Planet im äußersten Sonnensystem, der bislang nicht direkt beobachtet wurde. Die Hypothese wurde 2016 von Konstantin Batygin und Michael Brown (Caltech) veröffentlicht, nachdem sie eine statistisch auffällige Häufung festgestellt hatten: Sechs weit entfernte transneptunische Objekte (darunter [url=body:sedna]Sedna[/url]) haben ihre [url=concept:periapsis]Perihelargumente[/url] in einem ähnlichen Winkel geclustert — eine Konfiguration, die per Zufall eine Wahrscheinlichkeit von ~1:14.000 hat. Ein massereicher, weit entfernter Planet könnte diese Objekte gravitativ in diesen Bereich gezwungen haben.

Modelle schätzen Masse und Bahn des hypothetischen Körpers: ~5–10 Erdmassen, Halbachse ~400–800 AU, Umlaufzeit ~10.000–20.000 Jahre. Bei diesen Distanzen wäre er in Teleskopen extrem schwach — selbst wenn er ein Superneptun wäre, hätte er eine scheinbare Helligkeit von ~22–25 mag, was selbst für moderne Surveys am Limit liegt. Das Vera-Rubin-Observatorium (LSST) wird nach seiner Inbetriebnahme die tiefste und vollständigste Durchmusterung des äußeren Sonnensystems durchführen und könnte Planet Nine entweder finden oder das Suchgebiet stark einschränken.

Die Hypothese ist wissenschaftlich umstritten. Mehrere Alternativerklärungen wurden vorgeschlagen: (1) [b]Selektionsbias[/b] — die geclusterten Objekte wurden bevorzugt in bestimmten Himmelsbereichen gesucht, was die scheinbare Häufung verursacht. (2) Gravitativer Einfluss des Kuipergürtels als Ganzes. (3) Statistischer Zufall. Analysen neuerer, weniger selektiver Surveys (wie OSSOS) fanden schwächere Clustering-Signale, was die Bias-Hypothese stärkt — aber auch mit einem Planet Nine vereinbar ist.

Falls Planet Nine existiert, wäre er kein klassisch geformter Planet, sondern möglicherweise ein [b]Eisriese[/b] ähnlich Uranus oder Neptun — möglicherweise ein Ejected Rogue Planet, den Neptun in der Frühzeit in die äußere Bahn warf, oder ein eingefangenes Objekt aus dem fremden Sternhaufen, in dem die Sonne entstand. Die Suche läuft weiter."""

