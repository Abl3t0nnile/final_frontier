
<div style="font-family: 'Courier New', monospace; background: #060e0a; color: #c8d8d0; width: 100%; aspect-ratio: 16/9; display: flex; flex-direction: column; border: 0.5px solid #1e5032; border-radius: 4px; overflow: hidden;">

        </div>
      </div>

      <div style="width: 0.5px; height: 14px; background: #1e5032;"></div>

      <!-- Exag stepper -->
      <div style="display: flex; align-items: center; gap: 4px;">
        <span style="font-size: 9px; color: #4a6a5a;">EXAG</span>
        <div style="display: flex; align-items: center; gap: 2px;">

          <div style="padding: 1px 5px; border: 0.5px solid #1e5032; border-radius: 2px; font-size: 10px; color: #a0b8ac; cursor: pointer;">+</div>
